name: "Build and release for fastfetch"

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "Apps/fastfetch/**"

jobs:
  create:
    name: "Creates the newest release by version"
    runs-on: "ubuntu-latest"
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read

    steps:
      - name: Checkout project
        uses: actions/checkout@v2.3.4

      # New step to read the VERSION file and set the version as an output
      - name: Get the version
        id: get_version
        run: |
          VERSION=$(tr -d '\n\r' < Apps/fastfetch/VERSION)
          [[ "$VERSION" =~ ^[0-9A-Za-z._-]+$ ]] || { echo "Invalid VERSION: $VERSION"; exit 1; }
          echo "fastfetch_version=$VERSION" >> "$GITHUB_ENV"

      - name: Set build metadata
        run: echo "created=$(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> "$GITHUB_ENV"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@master
        with:
          platforms: all

      - name: Set up Docker Build
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v3
        with:
          push: true
          platforms: linux/amd64,linux/arm64
          context: ./Apps/fastfetch
          file: ./Apps/fastfetch/Dockerfile
          build-args: |
            VERSION=${{ env.fastfetch_version }}
            REVISION=${{ github.sha }}
            CREATED=${{ env.created }}
          tags: |
            bigbeartechworld/big-bear-fastfetch:latest
            bigbeartechworld/big-bear-fastfetch:${{ env.fastfetch_version }}
