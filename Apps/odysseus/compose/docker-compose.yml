services:
  big-bear-odysseus:
    build: ../
    image: bigbeartechworld/big-bear-odysseus:latest
    # For production, pin: image: bigbeartechworld/big-bear-odysseus:2026.06.01-<sha>
    container_name: big-bear-odysseus
    restart: unless-stopped
    ports:
      - "7000:7000"
    environment:
      PUID: 1000
      PGID: 1000
      AUTH_ENABLED: "true"
      # CHANGE THIS BEFORE FIRST BOOT
      ODYSSEUS_ADMIN_PASSWORD: changeme
      SEARXNG_INSTANCE: http://searxng:8080
      CHROMADB_HOST: chromadb
      CHROMADB_PORT: 8000
    volumes:
      - big_bear_odysseus_data:/app/data
      - big_bear_odysseus_logs:/app/logs
    depends_on:
      searxng:
        condition: service_healthy
      chromadb:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  chromadb:
    image: chromadb/chroma:latest
    container_name: big-bear-odysseus-chromadb
    restart: unless-stopped
    environment:
      ANONYMIZED_TELEMETRY: "FALSE"
    volumes:
      - big_bear_odysseus_chromadb:/chroma/chroma

  searxng:
    image: searxng/searxng:latest
    container_name: big-bear-odysseus-searxng
    restart: unless-stopped
    volumes:
      - big_bear_odysseus_searxng:/etc/searxng
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 5s
      timeout: 6s
      retries: 20
      start_period: 10s

  ntfy:
    image: binwiederhier/ntfy:latest
    container_name: big-bear-odysseus-ntfy
    restart: unless-stopped
    command: serve
    volumes:
      - big_bear_odysseus_ntfy:/var/cache/ntfy

volumes:
  big_bear_odysseus_data:
    driver: local
  big_bear_odysseus_logs:
    driver: local
  big_bear_odysseus_chromadb:
    driver: local
  big_bear_odysseus_searxng:
    driver: local
  big_bear_odysseus_ntfy:
    driver: local
