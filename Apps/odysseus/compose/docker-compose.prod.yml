services:
  big-bear-odysseus:
    image: bigbeartechworld/big-bear-odysseus:latest
    container_name: big-bear-odysseus-prod
    restart: always
    ports:
      - "7000:7000"
    environment:
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
      AUTH_ENABLED: "true"
      ODYSSEUS_ADMIN_PASSWORD: ${ODYSSEUS_ADMIN_PASSWORD:-changeme}
      SEARXNG_INSTANCE: http://searxng:8080
      CHROMADB_HOST: chromadb
      CHROMADB_PORT: 8000
    volumes:
      - big_bear_odysseus_prod_data:/app/data
      - big_bear_odysseus_prod_logs:/app/logs
    depends_on:
      searxng:
        condition: service_healthy
      chromadb:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '1.0'
          memory: 2G
    security_opt:
      - no-new-privileges:true

  chromadb:
    image: chromadb/chroma:latest
    container_name: big-bear-odysseus-chromadb-prod
    restart: always
    environment:
      ANONYMIZED_TELEMETRY: "FALSE"
    volumes:
      - big_bear_odysseus_chromadb_prod:/chroma/chroma
    security_opt:
      - no-new-privileges:true

  searxng:
    image: searxng/searxng:latest
    container_name: big-bear-odysseus-searxng-prod
    restart: always
    volumes:
      - big_bear_odysseus_searxng_prod:/etc/searxng
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 5s
      timeout: 6s
      retries: 20
      start_period: 10s

  ntfy:
    image: binwiederhier/ntfy:latest
    container_name: big-bear-odysseus-ntfy-prod
    restart: always
    command: serve
    ports:
      - "${NTFY_BIND:-127.0.0.1}:8091:80"
    environment:
      NTFY_BASE_URL: ${NTFY_BASE_URL:-http://localhost:8091}
    volumes:
      - big_bear_odysseus_ntfy_prod:/var/cache/ntfy

volumes:
  big_bear_odysseus_prod_data:
    driver: local
  big_bear_odysseus_prod_logs:
    driver: local
  big_bear_odysseus_chromadb_prod:
    driver: local
  big_bear_odysseus_searxng_prod:
    driver: local
  big_bear_odysseus_ntfy_prod:
    driver: local
